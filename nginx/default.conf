upstream zabbix_frontend {
    server zbx-web-01:8080 max_fails=3 fail_timeout=10s;
    server zbx-web-02:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name zabbix.ertechnol.com.br localhost;

    location / {
        proxy_pass http://zabbix_frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
